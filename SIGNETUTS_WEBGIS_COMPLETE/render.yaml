services:
  - type: web
    name: webgis-pekalongan
    env: node
    plan: free
    buildCommand: npm install && npm run db:init && npm run db:import
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ADMIN_NAME
        value: Administrator WebGIS